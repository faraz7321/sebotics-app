steps:
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-f",
        "app/Dockerfile",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_APP_IMAGE}:${_IMAGE_TAG}",
        "app",
      ]

  - name: gcr.io/cloud-builders/docker
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_APP_IMAGE}:${_IMAGE_TAG}",
      ]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        EXTRA_ARGS="--execution-environment=gen2 --cpu=${_CPU} --memory=${_MEMORY} --concurrency=${_CONCURRENCY} --timeout=${_TIMEOUT} --min-instances=${_MIN_INSTANCES} --max-instances=${_MAX_INSTANCES} --ingress=${_INGRESS}"

        if [ "${_ALLOW_UNAUTHENTICATED}" = "true" ]; then
          EXTRA_ARGS="$$EXTRA_ARGS --allow-unauthenticated"
        fi

        if [ -n "${_SERVICE_ACCOUNT}" ]; then
          EXTRA_ARGS="$$EXTRA_ARGS --service-account=${_SERVICE_ACCOUNT}"
        fi

        if [ -n "${_APP_API_BASE_URL}" ] || [ -n "${_APP_API_PROXY_TARGET}" ]; then
          ENV_VARS=""
          if [ -n "${_APP_API_BASE_URL}" ]; then
            ENV_VARS="VITE_PUBLIC_API_URL=${_APP_API_BASE_URL}"
          fi
          if [ -n "${_APP_API_PROXY_TARGET}" ]; then
            if [ -n "$$ENV_VARS" ]; then
              ENV_VARS="$$ENV_VARS,API_PROXY_TARGET=${_APP_API_PROXY_TARGET}"
            else
              ENV_VARS="API_PROXY_TARGET=${_APP_API_PROXY_TARGET}"
            fi
          fi
          EXTRA_ARGS="$$EXTRA_ARGS --set-env-vars=$$ENV_VARS"
        fi

        gcloud run deploy "${_APP_SERVICE}" \
          --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_APP_IMAGE}:${_IMAGE_TAG}" \
          --region "${_REGION}" \
          --platform managed \
          --port 8080 \
          $$EXTRA_ARGS

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_APP_IMAGE}:${_IMAGE_TAG}"

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: europe-west1
  _AR_REPO: sebotics
  _IMAGE_TAG: latest
  _APP_IMAGE: sebotics-ax-app
  _APP_SERVICE: sebotics-ax-app
  _ALLOW_UNAUTHENTICATED: "true"
  _CPU: "1"
  _MEMORY: "512Mi"
  _CONCURRENCY: "80"
  _TIMEOUT: "120s"
  _MIN_INSTANCES: "0"
  _MAX_INSTANCES: "20"
  _INGRESS: "all"
  _SERVICE_ACCOUNT: "sebotics-ax-app-sa@sebotics.iam.gserviceaccount.com"
  _APP_API_BASE_URL: ""
  _APP_API_PROXY_TARGET: ""
