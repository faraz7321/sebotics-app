# app/docker-compose.yml (service `web`)
services:
  web:
    env_file: .env
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${APP_PORT:-5173}:${APP_PORT:-5173}"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true
