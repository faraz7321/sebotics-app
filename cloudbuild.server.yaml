steps:
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-f",
        "server/Dockerfile",
        "-t",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVER_IMAGE}:${_IMAGE_TAG}",
        "server",
      ]

  - name: gcr.io/cloud-builders/docker
    args:
      [
        "push",
        "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVER_IMAGE}:${_IMAGE_TAG}",
      ]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        EXTRA_ARGS="--execution-environment=gen2 --cpu=${_CPU} --memory=${_MEMORY} --concurrency=${_CONCURRENCY} --timeout=${_TIMEOUT} --min-instances=${_MIN_INSTANCES} --max-instances=${_MAX_INSTANCES} --ingress=${_INGRESS}"

        if [ "${_ALLOW_UNAUTHENTICATED}" = "true" ]; then
          EXTRA_ARGS="$$EXTRA_ARGS --allow-unauthenticated"
        fi

        if [ -n "${_SERVICE_ACCOUNT}" ]; then
          EXTRA_ARGS="$$EXTRA_ARGS --service-account=${_SERVICE_ACCOUNT}"
        fi

        if [ -n "${_VPC_CONNECTOR}" ]; then
          EXTRA_ARGS="$$EXTRA_ARGS --vpc-connector=${_VPC_CONNECTOR}"
        fi

        if [ -n "${_VPC_EGRESS}" ]; then
          EXTRA_ARGS="$$EXTRA_ARGS --vpc-egress=${_VPC_EGRESS}"
        fi

        if [ -n "${_CLOUDSQL_CONNECTION}" ]; then
          EXTRA_ARGS="$$EXTRA_ARGS --add-cloudsql-instances=${_CLOUDSQL_CONNECTION}"
        fi

        if [ -n "${_ENV_VARS}" ]; then
          EXTRA_ARGS="$$EXTRA_ARGS --set-env-vars=${_ENV_VARS}"
        fi

        if [ -n "${_SECRETS}" ]; then
          EXTRA_ARGS="$$EXTRA_ARGS --set-secrets=${_SECRETS}"
        fi

        gcloud run deploy "${_SERVER_SERVICE}" \
          --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVER_IMAGE}:${_IMAGE_TAG}" \
          --region "${_REGION}" \
          --platform managed \
          --port 8080 \
          $$EXTRA_ARGS

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVER_IMAGE}:${_IMAGE_TAG}"

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: europe-west1
  _AR_REPO: sebotics
  _IMAGE_TAG: latest
  _SERVER_IMAGE: sebotics-ax-server
  _SERVER_SERVICE: sebotics-ax-server
  _ALLOW_UNAUTHENTICATED: "true"
  _CPU: "1"
  _MEMORY: "512Mi"
  _CONCURRENCY: "80"
  _TIMEOUT: "300s"
  _MIN_INSTANCES: "0"
  _MAX_INSTANCES: "20"
  _INGRESS: "all"
  _SERVICE_ACCOUNT: "sebotics-ax-server-sa@sebotics.iam.gserviceaccount.com"
  _VPC_CONNECTOR: ""
  _VPC_EGRESS: ""
  _CLOUDSQL_CONNECTION: ""
  _ENV_VARS: "NODE_ENV=production,ENABLE_SWAGGER=false,CORS_ORIGIN=https://app.sebotics.com,AUTOXING_BASE_URL=https://apiglobal.autoxing.com,AUTOXING_TIMESTAMP_UNIT=ms"
  _SECRETS: "DATABASE_URL=SEBOTICS_AX_DATABASE_URL:latest,JWT_SECRET=SEBOTICS_AX_JWT_SECRET:latest,REFRESH_TOKEN_SECRET=SEBOTICS_AX_REFRESH_TOKEN_SECRET:latest,AUTOXING_APP_ID=SEBOTICS_AX_AUTOXING_APP_ID:latest,AUTOXING_APP_SECRET=SEBOTICS_AX_AUTOXING_APP_SECRET:latest,AUTOXING_APP_CODE=SEBOTICS_AX_AUTOXING_APP_CODE:latest"
