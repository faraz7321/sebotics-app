name: CD

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: sebotics-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Google Cloud Run
    runs-on: ubuntu-latest
    environment: production
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION || secrets.GCP_REGION }}
      GCP_ARTIFACT_REPO: ${{ vars.GCP_ARTIFACT_REPO || secrets.GCP_ARTIFACT_REPO }}
      GCP_SERVER_SERVICE: ${{ vars.GCP_SERVER_SERVICE || secrets.GCP_SERVER_SERVICE }}
      GCP_APP_SERVICE: ${{ vars.GCP_APP_SERVICE || secrets.GCP_APP_SERVICE }}
      GCP_SERVER_RUNTIME_SA: ${{ vars.GCP_SERVER_RUNTIME_SA || secrets.GCP_SERVER_RUNTIME_SA }}
      GCP_APP_RUNTIME_SA: ${{ vars.GCP_APP_RUNTIME_SA || secrets.GCP_APP_RUNTIME_SA }}
      GCP_CLOUDSQL_CONNECTION: ${{ vars.GCP_CLOUDSQL_CONNECTION || secrets.GCP_CLOUDSQL_CONNECTION }}
      GCP_DATABASE_URL_SECRET: ${{ vars.GCP_DATABASE_URL_SECRET || secrets.GCP_DATABASE_URL_SECRET }}
      GCP_API_BASE_URL: ${{ vars.GCP_API_BASE_URL || secrets.GCP_API_BASE_URL }}
      GCP_APP_PUBLIC_URL: ${{ vars.GCP_APP_PUBLIC_URL || secrets.GCP_APP_PUBLIC_URL }}
      GCP_SERVER_CORS_ORIGIN: ${{ vars.GCP_SERVER_CORS_ORIGIN || secrets.GCP_SERVER_CORS_ORIGIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate GCP auth configuration
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER || vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          DEPLOYER_SA: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT || vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          test -n "${WIF_PROVIDER}" || { echo "Missing GCP_WORKLOAD_IDENTITY_PROVIDER (set it in GitHub Secrets or Variables)"; exit 1; }
          test -n "${DEPLOYER_SA}" || { echo "Missing GCP_DEPLOYER_SERVICE_ACCOUNT (set it in GitHub Secrets or Variables)"; exit 1; }
          test -n "${GCP_PROJECT_ID}" || { echo "Missing GCP_PROJECT_ID (set it in GitHub Secrets or Variables)"; exit 1; }
          test -n "${GCP_REGION}" || { echo "Missing GCP_REGION (set it in GitHub Secrets or Variables)"; exit 1; }
          test -n "${GCP_ARTIFACT_REPO}" || { echo "Missing GCP_ARTIFACT_REPO (set it in GitHub Secrets or Variables)"; exit 1; }
          test -n "${GCP_SERVER_SERVICE}" || { echo "Missing GCP_SERVER_SERVICE (set it in GitHub Secrets or Variables)"; exit 1; }
          test -n "${GCP_APP_SERVICE}" || { echo "Missing GCP_APP_SERVICE (set it in GitHub Secrets or Variables)"; exit 1; }
          test -n "${GCP_SERVER_RUNTIME_SA}" || { echo "Missing GCP_SERVER_RUNTIME_SA (set it in GitHub Secrets or Variables)"; exit 1; }
          test -n "${GCP_APP_RUNTIME_SA}" || { echo "Missing GCP_APP_RUNTIME_SA (set it in GitHub Secrets or Variables)"; exit 1; }
          test -n "${GCP_CLOUDSQL_CONNECTION}" || { echo "Missing GCP_CLOUDSQL_CONNECTION (set it in GitHub Secrets or Variables)"; exit 1; }
          test -n "${GCP_DATABASE_URL_SECRET}" || { echo "Missing GCP_DATABASE_URL_SECRET (set it in GitHub Secrets or Variables)"; exit 1; }

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER || vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SERVICE_ACCOUNT || vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run Prisma migrations
        run: |
          set -euo pipefail

          test -n "${GCP_CLOUDSQL_CONNECTION}" || {
            echo "Missing GCP_CLOUDSQL_CONNECTION variable."
            exit 1
          }
          test -n "${GCP_DATABASE_URL_SECRET}" || {
            echo "Missing GCP_DATABASE_URL_SECRET variable."
            exit 1
          }

          ACCESS_TOKEN="$(gcloud auth print-access-token)"
          DATABASE_URL_RAW="$(gcloud secrets versions access latest \
            --project "${GCP_PROJECT_ID}" \
            --secret "${GCP_DATABASE_URL_SECRET}")"

          DATABASE_URL="$(
            DATABASE_URL_RAW="${DATABASE_URL_RAW}" python3 - <<'PY'
          import os
          from urllib.parse import parse_qsl, quote, unquote, urlencode, urlsplit, urlunsplit

          raw = os.environ["DATABASE_URL_RAW"]
          parsed = urlsplit(raw)
          query = [(k, v) for (k, v) in parse_qsl(parsed.query, keep_blank_values=True) if k.lower() != "host"]

          if parsed.username is not None:
            user = quote(unquote(parsed.username), safe="")
            password = quote(unquote(parsed.password or ""), safe="")
            auth = f"{user}:{password}@"
          else:
            auth = ""

          netloc = f"{auth}127.0.0.1:6543"
          print(urlunsplit((parsed.scheme, netloc, parsed.path, urlencode(query), "")))
          PY
          )"

          docker rm -f sebotics-ax-sql-proxy >/dev/null 2>&1 || true
          docker run -d --rm --name sebotics-ax-sql-proxy \
            -p 127.0.0.1:6543:5432 \
            gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.18.2 \
            --token "${ACCESS_TOKEN}" \
            --address 0.0.0.0 \
            "${GCP_CLOUDSQL_CONNECTION}" >/dev/null

          cleanup() {
            docker rm -f sebotics-ax-sql-proxy >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for i in $(seq 1 20); do
            if (echo > /dev/tcp/127.0.0.1/6543) >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          if ! (echo > /dev/tcp/127.0.0.1/6543) >/dev/null 2>&1; then
            echo "Cloud SQL proxy did not start."
            docker logs sebotics-ax-sql-proxy || true
            exit 1
          fi

          cd server
          npm ci
          DATABASE_URL="${DATABASE_URL}" npx prisma migrate deploy

      - name: Deploy server image and service
        run: |
          set -euo pipefail

          substitutions=(
            "_REGION=${GCP_REGION}"
            "_AR_REPO=${GCP_ARTIFACT_REPO}"
            "_SERVER_SERVICE=${GCP_SERVER_SERVICE}"
          )

          if [ -n "${GCP_SERVER_RUNTIME_SA}" ]; then
            substitutions+=("_SERVICE_ACCOUNT=${GCP_SERVER_RUNTIME_SA}")
          fi

          if [ -n "${GCP_CLOUDSQL_CONNECTION}" ]; then
            substitutions+=("_CLOUDSQL_CONNECTION=${GCP_CLOUDSQL_CONNECTION}")
          fi

          gcloud builds submit . \
            --project "${GCP_PROJECT_ID}" \
            --config cloudbuild.server.yaml \
            --substitutions "$(IFS=,; echo "${substitutions[*]}")"

      - name: Read server URL
        id: server_url
        run: |
          set -euo pipefail
          SERVER_URL="$(gcloud run services describe "${GCP_SERVER_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --format='value(status.url)')"

          echo "url=${SERVER_URL}" >> "$GITHUB_OUTPUT"

      - name: Deploy app image and service
        run: |
          set -euo pipefail

          API_BASE_URL="${GCP_API_BASE_URL:-${{ steps.server_url.outputs.url }}/api}"

          substitutions=(
            "_REGION=${GCP_REGION}"
            "_AR_REPO=${GCP_ARTIFACT_REPO}"
            "_APP_SERVICE=${GCP_APP_SERVICE}"
            "_ENV_VARS=VITE_PUBLIC_API_URL=${API_BASE_URL}"
          )

          if [ -n "${GCP_APP_RUNTIME_SA}" ]; then
            substitutions+=("_SERVICE_ACCOUNT=${GCP_APP_RUNTIME_SA}")
          fi

          gcloud builds submit . \
            --project "${GCP_PROJECT_ID}" \
            --config cloudbuild.app.yaml \
            --substitutions "$(IFS=,; echo "${substitutions[*]}")"

      - name: Read app URL
        id: app_url
        run: |
          set -euo pipefail
          APP_URL="$(gcloud run services describe "${GCP_APP_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --format='value(status.url)')"

          echo "url=${APP_URL}" >> "$GITHUB_OUTPUT"

      - name: Update server CORS origin
        run: |
          set -euo pipefail

          CORS_ORIGIN="${GCP_SERVER_CORS_ORIGIN:-${GCP_APP_PUBLIC_URL:-${{ steps.app_url.outputs.url }}}}"

          gcloud run services update "${GCP_SERVER_SERVICE}" \
            --project "${GCP_PROJECT_ID}" \
            --region "${GCP_REGION}" \
            --update-env-vars "CORS_ORIGIN=${CORS_ORIGIN}"

      - name: Deployment summary
        run: |
          {
            echo "### Deployment completed"
            echo "- Server: ${{ steps.server_url.outputs.url }}"
            echo "- App: ${{ steps.app_url.outputs.url }}"
          } >> "$GITHUB_STEP_SUMMARY"
