services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-sebotics}
      - POSTGRES_USER=${POSTGRES_USER:-sebotics_app}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sebotics_app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sebotics_app} -d ${POSTGRES_DB:-sebotics}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nestjs-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PORT: ${PORT:-8080}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    env_file:
      - .env
    environment:
      # Keep compose deterministic: by default app connects to the postgres
      # service defined in this file.
      - DATABASE_URL=${DATABASE_URL_CONTAINER:-postgresql://sebotics_app:sebotics_app@postgres:5432/sebotics?schema=public}
    restart: unless-stopped

volumes:
  postgres_data:
